name: .NET Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
      - develop
      - release/*
      - feature/*
      - hotfix/*
    paths:
      - '.github/workflows/**'
      - 'build/**'
      - 'src/**'
  schedule:
    - cron: '0 3 * * *'

env:
  configuration: 'Debug'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  solution: 'Valuify.slnx'

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
        
    - name: Use .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x

    - name: Cache NuGet Packages
      uses: actions/cache@v5.0.4
      with:
        path: ${{ github.workspace }}/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore Nuget Packages for Solution
      run: dotnet restore ${{ env.solution }}

    - name: Build Solution
      shell: bash
      run: |
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
          dotnet build ${{ env.solution }} --configuration ${{ env.configuration }} -p:DefineConstants="CI" --no-restore
        else
          dotnet build ${{ env.solution }} --configuration ${{ env.configuration }} --no-restore
        fi

    - name: Test Solution
      run: dotnet test ${{ env.solution }} --configuration ${{ env.configuration }} --no-build

    - name: Upload Code Coverage
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
